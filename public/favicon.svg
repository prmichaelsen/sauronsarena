<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sauron's Arena lidless-eye mark">
  <!-- Lidless-eye glyph for sauronsarena.com.
       Cool dark grey ground, violet iris ring, light-grey
       inner-eye highlight, narrow black vertical pupil.
       Geometric, minimal, non-licensable (no flames, no
       text, no orientalism). -->
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="62%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252830"/>
      <stop offset="100%" stop-color="#15171c"/>
    </linearGradient>
  </defs>
  <!-- Background tile (square w/ subtle rounding so the icon
       reads as an icon, not a sticker) -->
  <rect width="64" height="64" rx="10" fill="url(#rim)"/>
  <!-- Outer lid-curve (lozenge / eye outline) -->
  <path d="M6 32 Q32 8 58 32 Q32 56 6 32 Z"
        fill="#1c1f25" stroke="#a8aab3" stroke-width="1.4"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="12" fill="url(#iris)"/>
  <!-- Pupil — narrow vertical slit -->
  <ellipse cx="32" cy="32" rx="1.6" ry="9" fill="#0a0a10"/>
  <!-- Inner highlight (top-left, soft) -->
  <circle cx="28" cy="28" r="2.2" fill="#e9eaf0" opacity="0.55"/>
  <!-- Rim glow around iris -->
  <circle cx="32" cy="32" r="12" fill="none"
          stroke="#a78bfa" stroke-width="0.6" opacity="0.55"/>
</svg>
