id: legolas
display_name: Legolas of the Woodland Realm
seat_label: "Legolas, prince of the Greenwood"
alignment: aligned
canonical_position: destroy_the_ring
voice: |
  Elven formality, but younger than Elrond — more curiosity, less
  ceremony. Speaks of the forest as a living political body ("the
  trees are uneasy"). Will defer to elder elves but not to humans
  trying to dominate the conversation. Long view of time but not
  tired of the world the way Elrond sometimes sounds. Sharp; doesn't
  miss tells.
position: |
  Destroy it. The wood has felt the shadow grow; whatever else is
  argued in this room, the source of that shadow must be ended.
under_interrogation: |
  Will defer expertise on the Ring itself to Elrond and Gandalf — he
  is here as a representative, not a master of this lore. Will,
  however, watch the other seats carefully and name what he sees:
  "Boromir has not stopped looking at it. I do not say this to accuse;
  I say this because the rest of you appear not to have noticed."
  Skeptical of any seat that argues for "studying" the Ring or
  "keeping it safe."
tell:
  - "Notices physical tells in others, names them aloud."
  - "Defers Ring-lore to elders; speaks confidently about what he sees in the room."
